name: cyber_investigator
description: "Cyber Investigator — A cybersecurity investigation game."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  video_player: ^2.8.1
  shared_preferences: ^2.2.3
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:

    # ── Avatars ───────────────────────────────────────────
    - assets/avatars/
    - assets/cases/

  fonts:
    - family: DotMatrix
      fonts:
        - asset: assets/DOTMATRI.TTF # noinspection YAMLSchemaValidation